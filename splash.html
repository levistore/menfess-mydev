<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menfess</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      background-color: #FAFAFA;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .envelope-wrapper {
      margin-bottom: 32px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-16px);
      }
    }

    .envelope-wrapper svg {
      width: 96px;
      height: 96px;
      filter: drop-shadow(4px 4px 0 #1a1a1a);
    }

    .title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .loading-dots span {
      width: 12px;
      height: 12px;
      background: #FF6B6B;
      border-radius: 50%;
      display: inline-block;
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: 0s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dotPulse {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="envelope-wrapper">
    <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Envelope body -->
      <rect x="8" y="24" width="80" height="52" rx="6" fill="#FF6B6B" stroke="#1a1a1a" stroke-width="4"/>
      <!-- Envelope flap -->
      <path d="M8 28 L48 56 L88 28" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Envelope bottom fold -->
      <path d="M8 76 L38 50" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
      <path d="M88 76 L58 50" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
      <!-- Heart -->
      <path d="M48 18 C48 14, 42 10, 39 14 C36 18, 48 28, 48 28 C48 28, 60 18, 57 14 C54 10, 48 14, 48 18Z" fill="#FF6B6B" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1 class="title">Menfess</h1>

  <div class="loading-dots">
    <span></span>
    <span></span>
    <span></span>
  </div>
</body>
</html>
